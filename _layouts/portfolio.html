---
layout: default
---
<article style="padding-top: 1rem;">
    <div class="post-header">
        <h1 class="post-title">{{ page.title }}</h1>
        {% if page.technologies %}
        <div class="post-meta" style="margin-bottom: 2rem; color: var(--accent-color);">
            <strong>Technologies:</strong> {{ page.technologies | join: ", " }}
        </div>
        {% endif %}
    </div>

    <div class="post-content">
        {{ content }}
    </div>
    
    <hr>
    <a href="{{ '/portfolio.html' | relative_url }}" class="btn">&larr; Back to Portfolio</a>
</article>
